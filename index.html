<section class="daily-section">

  <div class="card">
    <h2>✨ Quote of the Day</h2>
    <p id="quote"></p>
  </div>

  <div class="card">
    <h2>😊 Mood Hari Ini</h2>

    <div class="mood-buttons">
      <button onclick="setMood('😊 Senang')">😊</button>
      <button onclick="setMood('😐 Biasa')">😐</button>
      <button onclick="setMood('😔 Sedih')">😔</button>
      <button onclick="setMood('😴 Lelah')">😴</button>
    </div>

    <p id="mood-result"></p>
  </div>

  <div class="card">
    <h2>📝 Refleksi Hari Ini</h2>

    <textarea
      id="reflection"
      placeholder="Apa satu hal yang kamu syukuri hari ini?"
    ></textarea>

    <button onclick="saveReflection()">Simpan</button>
  </div>

  <div class="card">
    <h2>📋 To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Tambah kegiatan...">
    <button onclick="addTask()">Tambah</button>

    <ul id="taskList"></ul>
  </div>
